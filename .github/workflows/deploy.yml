name: myshortner03
'on':
  workflow_dispatch: {}
jobs:
  provision:
    runs-on: ubuntu-latest
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: us-east-1
      TF_VAR_project_name: ${{ secrets.PROJECT_NAME }}
      TF_VAR_ssh_public_key: ${{ secrets.SSH_PUBLIC_KEY }}
      TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
    timeout-minutes: 30
    outputs:
      instance_ip: ${{ steps.tf_outputs.outputs.instance_ip }}
    steps:
    - uses: actions/checkout@v4
    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: 1.7.5
        terraform_wrapper: false
    - name: Terraform Init
      run: "terraform init -reconfigure -input=false -reconfigure \\\n  -backend-config=\"bucket=${{\
        \ secrets.TF_STATE_BUCKET }}\" \\\n  -backend-config=\"key=${{ secrets.PROJECT_NAME\
        \ }}/terraform.tfstate\" \\\n  -backend-config=\"region=us-east-1\"\n"
      working-directory: infra
    - name: Terraform Apply
      run: terraform apply -input=false -auto-approve
      working-directory: infra
    - id: tf_outputs
      name: Export Outputs
      run: 'echo "instance_ip=$(terraform output -raw instance_ip)" >> "$GITHUB_OUTPUT"

        terraform output -raw rds_endpoint > /tmp/rds_endpoint.txt

        '
      working-directory: infra
    - name: Upload RDS endpoint artifact
      uses: actions/upload-artifact@v4
      with:
        name: tf-outputs
        path: /tmp/rds_endpoint.txt
  configure:
    runs-on: ubuntu-latest
    needs:
    - provision
    timeout-minutes: 20
    steps:
    - uses: actions/checkout@v4
    - name: Install Ansible
      run: pip install ansible-core
    - name: Download RDS endpoint artifact
      uses: actions/download-artifact@v4
      with:
        name: tf-outputs
        path: /tmp
    - name: Write SSH Key
      run: 'mkdir -p ~/.ssh

        printf ''%s'' "$SSH_KEY" | sed ''s/\\n/\n/g'' > ~/.ssh/deploy_key

        echo "" >> ~/.ssh/deploy_key

        chmod 600 ~/.ssh/deploy_key

        '
      env:
        SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
    - name: Diagnose SSH key
      run: 'echo "=== Derived public key from private ==="

        ssh-keygen -y -f ~/.ssh/deploy_key || echo "FAILED: private key is malformed"

        echo "=== Expected (first 60 chars) ==="

        echo "$SSH_PUBLIC_KEY" | cut -c1-60

        '
      env:
        SSH_PUBLIC_KEY: ${{ secrets.SSH_PUBLIC_KEY }}
    - name: Wait for SSH
      run: 'HOST="${{ needs.provision.outputs.instance_ip }}"

        echo "Waiting 60s for instance boot..."

        sleep 60

        ssh-keyscan -H "$HOST" >> ~/.ssh/known_hosts 2>/dev/null || true

        '
    - name: Generate Inventory
      run: 'cat > ansible/inventory.ini <<EOF

        [app]

        ${{ needs.provision.outputs.instance_ip }} ansible_user=${{ secrets.SSH_USER
        }} ansible_ssh_private_key_file=~/.ssh/deploy_key ansible_ssh_common_args=''-o
        StrictHostKeyChecking=accept-new''

        EOF

        '
    - name: Run Ansible Playbook
      run: "RDS_HOST=$(cat /tmp/rds_endpoint.txt)\nansible-playbook -i ansible/inventory.ini\
        \ ansible/site.yml \\\n  -e \"db_host=${RDS_HOST}\" \\\n  -e \"db_password=${{\
        \ secrets.DB_PASSWORD }}\" \\\n  -e \"secret_key=${{ secrets.SECRET_KEY }}\"\
        \ \\\n  -e \"project_name=${{ secrets.PROJECT_NAME }}\"\n"
      env:
        DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        SECRET_KEY: ${{ secrets.SECRET_KEY }}
  verify:
    runs-on: ubuntu-latest
    needs:
    - provision
    - configure
    timeout-minutes: 5
    steps:
    - uses: actions/checkout@v4
    - name: Health Check
      run: "curl --fail --retry 10 --retry-delay 15 --retry-all-errors \\\n  http://${{\
        \ needs.provision.outputs.instance_ip }}/health\n"
