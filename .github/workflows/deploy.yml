      run: 'echo "rds_host=$(echo ''${{ needs.provision.outputs.rds_endpoint_b64 }}''
        | base64 -d)" >> "$GITHUB_OUTPUT"

        '
    - name: Run Ansible Playbook
      run: "ansible-playbook -i ansible/inventory.ini ansible/site.yml \\\n  -e \"\
