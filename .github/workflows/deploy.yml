jobs:
  provision:
    runs-on: ubuntu-latest
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: us-east-1
      TF_VAR_project_name: ${{ secrets.PROJECT_NAME }}
      TF_VAR_ssh_public_key: ${{ secrets.SSH_PUBLIC_KEY }}
      TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
    timeout-minutes: 30
    outputs:
      instance_ip: ${{ steps.tf_outputs.outputs.instance_ip }}
      rds_endpoint_b64: ${{ steps.tf_outputs.outputs.rds_endpoint_b64 }}
    steps:
    - uses: actions/checkout@v4
    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: 1.7.5
        terraform_wrapper: false
    - name: Terraform Init
      run: "terraform init -input=false -reconfigure \\\n  -backend-config=\"bucket=${{\
        \ secrets.TF_STATE_BUCKET }}\" \\\n  -backend-config=\"key=${{ secrets.PROJECT_NAME\
        \ }}/terraform.tfstate\" \\\n  -backend-config=\"region=us-east-1\"\n"
      working-directory: infra
    - name: Terraform Apply
      run: terraform apply -input=false -auto-approve
      working-directory: infra
    - id: tf_outputs
      name: Export Outputs
      run: 'echo "instance_ip=$(terraform output -raw instance_ip)" >> "$GITHUB_OUTPUT"

        RDS_RAW=$(terraform output -raw rds_endpoint)

        echo "rds_endpoint_b64=$(echo -n "$RDS_RAW" | base64 -w 0)" >> "$GITHUB_OUTPUT"

        '
      working-directory: infra
  configure:
    runs-on: ubuntu-latest
    needs:
    - provision
    timeout-minutes: 20
    steps:
    - uses: actions/checkout@v4
    - name: Install Ansible
      run: pip install ansible-core
    - name: Write SSH Key
      run: 'mkdir -p ~/.ssh

        printf ''%s\n'' "$SSH_KEY" > ~/.ssh/deploy_key

        chmod 600 ~/.ssh/deploy_key

        ssh-keyscan -H "${{ needs.provision.outputs.instance_ip }}" >> ~/.ssh/known_hosts

