version: 1
name: myshortner03
vcs: github

stages:
  - id: provision
    kind: provision
    needs: []
    timeout_minutes: 30
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: us-east-1
      TF_VAR_project_name: ${{ secrets.PROJECT_NAME }}
      TF_VAR_ssh_public_key: ${{ secrets.SSH_PUBLIC_KEY }}
      TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
    outputs:
      instance_ip: ${{ steps.tf_outputs.outputs.instance_ip }}
      rds_endpoint_b64: ${{ steps.tf_outputs.outputs.rds_endpoint_b64 }}
    steps:
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.5
          terraform_wrapper: false

      - name: Terraform Init
        run: |
          terraform init -input=false -reconfigure \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=${{ secrets.PROJECT_NAME }}/terraform.tfstate" \
            -backend-config="region=us-east-1"
        working-directory: infra

      - name: Terraform Apply
        run: terraform apply -input=false -auto-approve
        working-directory: infra

      - name: Export Outputs
        id: tf_outputs
        run: |
          echo "instance_ip=$(terraform output -raw instance_ip)" >> "$GITHUB_OUTPUT"
          RDS_RAW=$(terraform output -raw rds_endpoint)
          echo "rds_endpoint_b64=$(echo -n "$RDS_RAW" | base64 -w 0)" >> "$GITHUB_OUTPUT"
        working-directory: infra

  - id: configure
    kind: configure
    needs: [provision]
    timeout_minutes: 20
    steps:
      - name: Install Ansible
        run: pip install ansible-core

      - name: Write SSH Key
        env:
          SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ needs.provision.outputs.instance_ip }}" >> ~/.ssh/known_hosts

      - name: Generate Inventory
        run: |
          cat > ansible/inventory.ini <<EOF
          [app]
          ${{ needs.provision.outputs.instance_ip }} ansible_user=${{ secrets.SSH_USER }} ansible_ssh_private_key_file=~/.ssh/deploy_key ansible_ssh_common_args='-o StrictHostKeyChecking=accept-new'
          EOF

      - name: Decode RDS endpoint
        id: rds
        run: |
          echo "rds_host=$(echo '${{ needs.provision.outputs.rds_endpoint_b64 }}' | base64 -d)" >> "$GITHUB_OUTPUT"

      - name: Run Ansible Playbook
        env:
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
        run: |
          ansible-playbook -i ansible/inventory.ini ansible/site.yml \
            -e "db_host=${{ steps.rds.outputs.rds_host }}" \
            -e "db_password=${{ secrets.DB_PASSWORD }}" \
            -e "secret_key=${{ secrets.SECRET_KEY }}" \
            -e "project_name=${{ secrets.PROJECT_NAME }}"

  - id: verify
    kind: verify
    needs: [provision, configure]
    timeout_minutes: 5
    steps:
      - name: Health Check
        run: |
          curl --fail --retry 10 --retry-delay 15 --retry-all-errors \
            http://${{ needs.provision.outputs.instance_ip }}/health

rollback:
  strategy: manual
