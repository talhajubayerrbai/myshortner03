version: 1
name: myshortner03
vcs: github

stages:
  - id: provision
    kind: provision
    needs: []
    timeout_minutes: 30
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: us-east-1
      TF_VAR_project_name: ${{ secrets.PROJECT_NAME }}
      TF_VAR_ssh_public_key: ${{ secrets.SSH_PUBLIC_KEY }}
      TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
    outputs:
      instance_ip: ${{ steps.tf_outputs.outputs.instance_ip }}
    steps:
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.5
          terraform_wrapper: false

      - name: Terraform Init
        run: |
          terraform init -reconfigure -input=false -reconfigure \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=${{ secrets.PROJECT_NAME }}/terraform.tfstate" \
            -backend-config="region=us-east-1"
        working-directory: infra

      - name: Terraform Apply
        run: terraform apply -input=false -auto-approve -replace=aws_key_pair.app
        working-directory: infra

      - name: Export Outputs
        id: tf_outputs
        run: |
          echo "instance_ip=$(terraform output -raw instance_ip)" >> "$GITHUB_OUTPUT"
          terraform output -raw rds_endpoint > /tmp/rds_endpoint.txt
        working-directory: infra

      - name: Upload RDS endpoint artifact
        uses: actions/upload-artifact@v4
        with:
          name: tf-outputs
          path: /tmp/rds_endpoint.txt

  - id: configure
    kind: configure
    needs: [provision]
    timeout_minutes: 20
    steps:
      - name: Install Ansible
        run: pip install ansible-core

      - name: Download RDS endpoint artifact
        uses: actions/download-artifact@v4
        with:
          name: tf-outputs
          path: /tmp

      - name: Write SSH Key
        env:
          SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          python3 -c "
          import os
          key = os.environ['SSH_KEY'].replace('\\n', '\n')
          if not key.endswith('\n'):
              key += '\n'
          open(os.path.expanduser('~/.ssh/deploy_key'), 'w').write(key)
          "
          chmod 600 ~/.ssh/deploy_key

      - name: Wait for SSH
        run: |
          echo "Waiting 40s for instance to boot and sshd to start..."
          sleep 40
          ssh-keyscan -H "${{ needs.provision.outputs.instance_ip }}" >> ~/.ssh/known_hosts

      - name: Generate Inventory
        run: |
          cat > ansible/inventory.ini <<EOF
          [app]
          ${{ needs.provision.outputs.instance_ip }} ansible_user=${{ secrets.SSH_USER }} ansible_ssh_private_key_file=~/.ssh/deploy_key ansible_ssh_common_args='-o StrictHostKeyChecking=accept-new'
          EOF

      - name: Run Ansible Playbook
        env:
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
        run: |
          RDS_HOST=$(cat /tmp/rds_endpoint.txt)
          ansible-playbook -i ansible/inventory.ini ansible/site.yml \
            -e "db_host=${RDS_HOST}" \
            -e "db_password=${{ secrets.DB_PASSWORD }}" \
            -e "secret_key=${{ secrets.SECRET_KEY }}" \
            -e "project_name=${{ secrets.PROJECT_NAME }}"

  - id: verify
    kind: verify
    needs: [provision, configure]
    timeout_minutes: 5
    steps:
      - name: Health Check
        run: |
          curl --fail --retry 10 --retry-delay 15 --retry-all-errors \
            http://${{ needs.provision.outputs.instance_ip }}/health

rollback:
  strategy: manual
